<section id="education" class="relative bg-slate-50/60 py-20 sm:py-28 dark:bg-slate-900/30">
  <div class="mx-auto max-w-5xl px-6 sm:px-8">
    <div appReveal class="mx-auto max-w-2xl text-center">
      <p class="font-pirate text-base text-amber-600 dark:text-amber-400">Training Arc</p>
      <h2 class="mt-3 font-display text-2xl font-bold tracking-tight sm:text-4xl">Academic background &amp; credentials</h2>
    </div>

    <div class="mt-14 grid grid-cols-1 gap-6 sm:grid-cols-2">
      <div appReveal class="wanted-frame bg-parchment rounded-2xl p-6 shadow-sm transition-transform hover:-translate-y-1 sm:p-8">
        <div class="mb-4 grid h-11 w-11 place-items-center rounded-xl bg-gradient-to-br from-amber-400 to-red-500 text-white shadow-lg shadow-amber-500/20">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
            <path d="M22 10 12 5 2 10l10 5 10-5Z"/>
            <path d="M6 12v5c3 2 9 2 12 0v-5"/>
          </svg>
        </div>
        <h3 class="font-display text-lg font-bold sm:text-xl">Bachelor of Science in Information Technology</h3>
        <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Our Lady of Fatima University</p>
        <p class="mt-1 text-sm font-medium text-amber-600 dark:text-amber-400">2019 – 2023</p>
      </div>

      <div appReveal [appRevealDelay]="120" class="wanted-frame bg-parchment rounded-2xl p-6 shadow-sm transition-transform hover:-translate-y-1 sm:p-8">
        <div class="mb-4 grid h-11 w-11 place-items-center rounded-xl bg-gradient-to-br from-amber-400 to-red-500 text-white shadow-lg shadow-amber-500/20">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
            <circle cx="12" cy="8" r="6"/>
            <path d="M15.5 13.5 17 22l-5-3-5 3 1.5-8.5"/>
          </svg>
        </div>
        <h3 class="font-display text-lg font-bold sm:text-xl">Philippines Civil Service Professional Eligibility</h3>
        <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Certification</p>
      </div>
    </div>
  </div>
</section>
