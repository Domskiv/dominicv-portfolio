<section id="education" class="border-b border-black dark:border-white">

  <div class="flex items-center border-b border-black px-6 py-3 sm:px-12 lg:px-20 dark:border-white">
    <span class="text-xs font-medium uppercase tracking-widest text-black/50 dark:text-white/50">Education</span>
  </div>

  <div class="grid grid-cols-1 divide-y divide-black/8 sm:grid-cols-2 sm:divide-x sm:divide-y-0 dark:divide-white/8">
    <div appReveal class="px-6 py-8 sm:px-12 lg:px-20">
      <p class="text-xs font-medium text-black/30 dark:text-white/30">2019 – 2023</p>
      <h3 class="mt-2 text-sm font-semibold text-black dark:text-white">
        Bachelor of Science in Information Technology
      </h3>
      <p class="mt-1 text-xs text-black/35 dark:text-white/35">Our Lady of Fatima University</p>
    </div>

    <div appReveal [appRevealDelay]="120" class="px-6 py-8 sm:px-12 lg:px-20">
      <p class="text-xs font-medium text-black/30 dark:text-white/30">Certification</p>
      <h3 class="mt-2 text-sm font-semibold text-black dark:text-white">
        Philippines Civil Service Professional Eligibility
      </h3>
    </div>
  </div>

</section>
