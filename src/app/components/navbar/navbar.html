<header class="fixed inset-x-0 top-0 z-50 border-b bg-white/90 backdrop-blur-sm transition-colors duration-300 dark:bg-black/90"
        [class]="scrolled() ? 'border-black dark:border-white' : 'border-black/20 dark:border-white/20'">
  <nav class="flex h-14 items-center justify-between px-6 sm:px-12 lg:px-20">

    <a href="#home" (click)="closeMenu()"
       class="font-display text-sm font-bold uppercase tracking-widest text-black transition-opacity hover:opacity-50 dark:text-white">
      DAV
    </a>

    <div class="hidden items-center gap-8 md:flex">
      @for (link of links; track link.href) {
        <a
          [href]="link.href"
          class="text-xs font-medium uppercase tracking-widest transition-colors"
          [class]="activeSection() === link.section
            ? 'text-black dark:text-white'
            : 'text-black/30 hover:text-black dark:text-white/30 dark:hover:text-white'"
        >{{ link.label }}</a>
      }
    </div>

    <div class="flex items-center gap-2">
      <button
        type="button"
        (click)="toggleTheme()"
        aria-label="Toggle theme"
        class="grid h-9 w-9 place-items-center text-black/30 transition-colors hover:text-black dark:text-white/30 dark:hover:text-white"
      >
        @if (theme.theme() === 'dark') {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>

      <button
        type="button"
        (click)="toggleMenu()"
        aria-label="Toggle menu"
        class="grid h-9 w-9 place-items-center text-black/30 transition-colors hover:text-black dark:text-white/30 dark:hover:text-white md:hidden"
      >
        @if (menuOpen()) {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-5 w-5">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-5 w-5">
            <path d="M4 6h16M4 12h16M4 18h7"/>
          </svg>
        }
      </button>
    </div>
  </nav>

  @if (menuOpen()) {
    <div class="border-t border-black bg-white/95 px-6 py-6 dark:border-white dark:bg-black/95 md:hidden">
      <div class="flex flex-col gap-5">
        @for (link of links; track link.href) {
          <a
            [href]="link.href"
            (click)="closeMenu()"
            class="text-xs font-bold uppercase tracking-widest text-black/40 transition-colors hover:text-black dark:text-white/40 dark:hover:text-white"
          >{{ link.label }}</a>
        }
      </div>
    </div>
  }
</header>
