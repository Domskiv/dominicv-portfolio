<section id="skills" class="border-b border-black dark:border-white">

  <div class="flex items-center border-b border-black px-6 py-3 sm:px-12 lg:px-20 dark:border-white">
    <span class="text-xs font-medium uppercase tracking-widest text-black/50 dark:text-white/50">Skills & Stack</span>
  </div>

  <!-- Tech skills: real logos + name -->
  <div class="border-b border-black/10 px-6 py-10 sm:px-12 lg:px-20 dark:border-white/10">
    <div appReveal class="flex flex-wrap gap-x-8 gap-y-5">
      @for (skill of techSkills; track skill.name) {
        <div class="group flex cursor-default items-center gap-2">
          <img
            [src]="iconUrl(skill.icon)"
            [alt]="skill.name"
            (error)="onIconError($event)"
            width="16"
            height="16"
            class="skill-icon block h-4 w-4 opacity-40 transition-opacity group-hover:opacity-100"
          >
          <span class="text-xs font-medium text-black/50 transition-colors group-hover:text-black dark:text-white/50 dark:group-hover:text-white">
            {{ skill.name }}
          </span>
        </div>
      }
    </div>
  </div>

  <!-- Practices: methodologies, no logos, secondary visual treatment -->
  <div class="px-6 py-8 sm:px-12 lg:px-20">
    <p class="mb-4 text-[10px] font-medium uppercase tracking-[0.2em] text-black/25 dark:text-white/25">
      Practices
    </p>
    <div appReveal class="flex flex-wrap gap-x-6 gap-y-2">
      @for (practice of practiceSkills; track practice) {
        <span class="cursor-default text-xs text-black/45 transition-colors hover:text-black/80 dark:text-white/45 dark:hover:text-white/80">
          {{ practice }}
        </span>
      }
    </div>
  </div>

</section>
